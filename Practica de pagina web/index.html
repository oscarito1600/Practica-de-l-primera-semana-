<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 16-07-2023</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #948a8a;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #ffffff;
            padding: 1rem 2rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header h1 {
            font-size: 1.5rem;
            color: #2c3e50;
        }

        header h1 span {
            font-size: 2rem;
            color: #2c5031;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        footer {
            background-color: #2c3e50;
            color: #ffffff;
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
        }

        .form-section {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 550px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #4a5568;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 0.65rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .btn-group {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn{
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 600;
        }
        #btnEnviar {
            background-color: #2c3e50;
            color: #ffffff;
        }
        input[type="reset"] {
            background-color: #e53e3e;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <header>
        <h1>
            <span>Practica</span>
            16-07-2023
        </h1>
    </header>
    <main>
        <section class="form-section">
            <h2>Formulario de Contacto</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Nombre:</label>
                    <input type="text" required />
                </div>
                <div class="form-group">
                    <label for="name">Edad:</label>
                    <input type="number" required />
                </div>
                <div class="form-group">
                    <label for="name">Fecha nacimientos:</label>
                    <input type="date" required />
                </div>
                <div class="form-group">
                    <label for="name">Pais:</label>
                    <select name="pais" id="pais" required>
                        <option value="">Seleccione un país</option>
                        <option value="mexico">El Salvador</option>
                        <option value="mexico">México</option>
                        <option value="colombia">Colombia</option>
                        <option value="argentina">Argentina</option>
                        <option value="chile">Chile</option>
                    </select>
                </div>
                <div class="btn-group">
                    <input id="btnEnviar" type="submit" value="Enviar" class="btn"/>
                    <input type="reset" value="Limpiar" class="btn"/>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Mi Sitio Web. Todos los derechos reservados.</p>
    </footer>
</body>

</html>
